services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: '3000'
      CORS_ORIGIN: http://localhost:8080

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3000/api
    ports:
      - '8080:80'
    depends_on:
      - backend
